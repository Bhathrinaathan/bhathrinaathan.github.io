<style>
.page-hero { padding: 140px 48px 60px; border-bottom: 1px solid var(--border); }
.page-hero h1 { font-family: var(--font-heading); font-size: 48px; font-weight: 700; letter-spacing: -1.5px; }
.page-hero p { color: var(--text-muted); margin-top: 8px; font-size: 15px; }

.contact-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 60px;
  align-items: start;
}
.contact-info { display: flex; flex-direction: column; gap: 24px; }
.contact-card {
  display: flex; align-items: center; gap: 16px;
  padding: 20px; background: var(--bg-card);
  border: 1px solid var(--border); border-radius: var(--radius);
  transition: all 0.2s;
}
.contact-card:hover {
  border-color: var(--accent); transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.04);
}
.contact-card-icon {
  width: 44px; height: 44px; border-radius: 10px;
  background: var(--accent-light); display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.contact-card-label { font-size: 13px; color: var(--text-muted); }
.contact-card-value { font-family: var(--font-heading); font-size: 15px; font-weight: 500; margin-top: 2px; }

.contact-form { display: flex; flex-direction: column; gap: 16px; }
.contact-form label {
  font-size: 13px; font-weight: 500; color: var(--text-muted);
  display: flex; flex-direction: column; gap: 6px;
}
.contact-form input, .contact-form textarea {
  padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 8px;
  font-family: var(--font-body); font-size: 14px; color: var(--text);
  background: var(--bg-card); outline: none; transition: border-color 0.2s;
  resize: vertical;
}
.contact-form input:focus, .contact-form textarea:focus { border-color: var(--accent); }

@media (max-width: 768px) { .contact-grid { grid-template-columns: 1fr; } }
</style>
